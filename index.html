<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>북크닉 예약시스템</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: #f6f8fc;
      color: #1f2937;
    }

    h1 {
      text-align: center;
      margin: 0 0 18px;
      font-size: clamp(24px, 3vw, 30px);
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 20px;
      align-items: start;
    }

    .card {
      background: #ffffff;
      border: 1px solid #dde3ec;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .card + .card {
      margin-top: 20px;
    }

    .card-body {
      padding: 18px;
    }

    .calendar-title {
      text-align: center;
      font-size: clamp(20px, 2.4vw, 24px);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .weekday {
      text-align: center;
      font-weight: 700;
      padding: 10px 0;
      border-radius: 10px;
      background: #f3f5f9;
      border: 1px solid #e2e8f0;
      font-size: clamp(11px, 1.5vw, 14px);
    }

    .weekday.sun { color: #dc2626; }
    .weekday.sat { color: #2563eb; }

    .empty {
      min-height: clamp(68px, 10vw, 96px);
    }

    .day {
      min-height: clamp(68px, 10vw, 96px);
      border: 1px solid #d9e1eb;
      border-radius: 12px;
      padding: 8px;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 6px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .day:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.10);
    }

    .day.disabled {
      background: #f1f5f9;
      color: #9ca3af;
      cursor: not-allowed;
      box-shadow: none;
    }

    .day.disabled:hover {
      transform: none;
      box-shadow: none;
    }

    .day.selected {
      background: #4caf50;
      border-color: #3f9d44;
      color: #ffffff;
    }

    .day-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 6px;
    }

    .date-number {
      font-size: clamp(15px, 2vw, 20px);
      font-weight: 700;
      line-height: 1;
    }

    .date-status {
      font-size: clamp(10px, 1.2vw, 12px);
      text-align: right;
      line-height: 1.35;
      white-space: pre-line;
    }

    .panel-title {
      margin: 0 0 14px;
      font-size: clamp(20px, 2.4vw, 24px);
    }

    .selected-date-box {
      margin-bottom: 14px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #bfdbfe;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      text-align: center;
      font-size: clamp(15px, 2vw, 18px);
      font-weight: 700;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border: 1px solid #cfd8e3;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    .secondary-btn { background: #475569; }
    .secondary-btn:hover { background: #334155; }

    .success-btn { background: #16a34a; }
    .success-btn:hover { background: #15803d; }

    .danger-btn {
      background: #dc2626;
      margin-top: 0;
      padding: 8px 10px;
      width: auto;
      font-size: 13px;
      border-radius: 8px;
    }

    .danger-btn:hover { background: #b91c1c; }

    .notice {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #eef4ff;
      color: #1d4ed8;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-line;
    }

    .notice.show { display: block; }

    .helper {
      margin-top: 14px;
      color: #667085;
      font-size: 13px;
      line-height: 1.5;
    }

    .admin-login,
    .admin-panel { margin-top: 14px; }

    .admin-panel { display: none; }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .admin-topbar strong { font-size: 16px; }

    .admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-btn {
      width: auto;
      margin-top: 0;
      padding: 9px 12px;
      font-size: 13px;
      border-radius: 8px;
    }

    .edit-box {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fafcff;
    }

    .edit-box h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
      font-size: 13px;
    }

    .small {
      color: #64748b;
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .card-body { padding: 14px; }
      .weekdays, .calendar-grid { gap: 4px; }
      .weekday { padding: 8px 0; }
      .day, .empty { min-height: 64px; }
      .day { padding: 6px; }
      .admin-topbar { align-items: stretch; }
      .admin-actions { width: 100%; }
      .admin-actions .mini-btn { flex: 1; }
    }
  </style>
</head>
<body>
  <h1>📅 북크닉 예약시스템</h1>

  <div class="layout">
    <section class="card">
      <div class="card-body">
        <div class="calendar-title">2026년 5월</div>

        <div class="weekdays">
          <div class="weekday sun">일</div>
          <div class="weekday">월</div>
          <div class="weekday">화</div>
          <div class="weekday">수</div>
          <div class="weekday">목</div>
          <div class="weekday">금</div>
          <div class="weekday sat">토</div>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
    </section>

    <section>
      <div class="card">
        <div class="card-body">
          <h2 class="panel-title">예약 입력</h2>
          <div class="selected-date-box" id="selectedDateBox">날짜를 선택하세요</div>

          <label for="teamName">팀명</label>
          <input id="teamName" type="text" placeholder="팀명 입력" />

          <label for="leaderName">대표자</label>
          <input id="leaderName" type="text" placeholder="대표자 입력" />

          <label for="phoneNumber">연락처</label>
          <input id="phoneNumber" type="text" placeholder="연락처 입력" />

          <label for="memberNames">팀원이름</label>
          <input id="memberNames" type="text" placeholder="팀원이름 입력" />

          <button id="reserveButton" type="button">예약하기</button>

          <div class="notice" id="noticeBox"></div>
          <div class="helper">예약 가능일은 2026년 5월 18일~22일입니다. 당일과 지난 날짜는 예약할 수 없고, 날짜별 최대 4팀까지 예약됩니다.</div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h2 class="panel-title">관리자 페이지</h2>

          <div class="admin-login" id="adminLoginBox">
            <label for="adminEmail">관리자 이메일</label>
            <input id="adminEmail" type="email" placeholder="관리자 이메일 입력" />

            <label for="adminPassword">관리자 비밀번호</label>
            <input id="adminPassword" type="password" placeholder="관리자 비밀번호 입력" />

            <button id="adminLoginButton" type="button" class="secondary-btn">관리자 로그인</button>
          </div>

          <div class="admin-panel" id="adminPanelBox">
            <div class="admin-topbar">
              <strong id="adminWelcomeText">관리자 로그인됨</strong>
              <div class="admin-actions">
                <button id="adminRefreshButton" type="button" class="mini-btn secondary-btn">새로고침</button>
                <button id="adminLogoutButton" type="button" class="mini-btn secondary-btn">로그아웃</button>
              </div>
            </div>

            <div class="edit-box">
              <h3>예약 수정</h3>
              <input id="editDocId" type="hidden" />

              <label for="editDate">날짜</label>
              <input id="editDate" type="text" placeholder="예: 2026-05-18" />

              <label for="editTeamName">팀명</label>
              <input id="editTeamName" type="text" placeholder="팀명 입력" />

              <label for="editLeaderName">대표자</label>
              <input id="editLeaderName" type="text" placeholder="대표자 입력" />

              <label for="editPhoneNumber">연락처</label>
              <input id="editPhoneNumber" type="text" placeholder="연락처 입력" />

              <label for="editMemberNames">팀원이름</label>
              <input id="editMemberNames" type="text" placeholder="팀원이름 입력" />

              <div class="admin-actions" style="margin-top:12px;">
                <button id="adminSaveEditButton" type="button" class="mini-btn success-btn">수정 저장</button>
                <button id="adminCancelEditButton" type="button" class="mini-btn secondary-btn">수정 취소</button>
              </div>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>날짜</th>
                    <th>팀명</th>
                    <th>대표자</th>
                    <th>연락처</th>
                    <th>팀원이름</th>
                    <th>신청시각</th>
                    <th>관리</th>
                  </tr>
                </thead>
                <tbody id="adminTableBody">
                  <tr>
                    <td colspan="7" class="small">로그인 후 예약 목록이 표시됩니다.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="notice" id="adminNoticeBox"></div>
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      where,
      getDocs,
      orderBy,
      deleteDoc,
      doc,
      getDoc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDa7xTGpAniRz7EeDvP5K5uIPOac5E_0jQ",
      authDomain: "booknic-113d9.firebaseapp.com",
      projectId: "booknic-113d9",
      storageBucket: "booknic-113d9.firebasestorage.app",
      messagingSenderId: "787863730383",
      appId: "1:787863730383:web:3eca8fa8c5df77e3f51fba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const YEAR = 2026;
    const MONTH_INDEX = 4;
    const MAX_TEAMS = 4;
    const ALLOWED_DATES = new Set([
      "2026-05-18",
      "2026-05-19",
      "2026-05-20",
      "2026-05-21",
      "2026-05-22"
    ]);

    const calendarGrid = document.getElementById("calendarGrid");
    const selectedDateBox = document.getElementById("selectedDateBox");
    const noticeBox = document.getElementById("noticeBox");
    const reserveButton = document.getElementById("reserveButton");

    const teamNameInput = document.getElementById("teamName");
    const leaderNameInput = document.getElementById("leaderName");
    const phoneNumberInput = document.getElementById("phoneNumber");
    const memberNamesInput = document.getElementById("memberNames");

    const adminEmailInput = document.getElementById("adminEmail");
    const adminPasswordInput = document.getElementById("adminPassword");
    const adminLoginButton = document.getElementById("adminLoginButton");
    const adminLogoutButton = document.getElementById("adminLogoutButton");
    const adminRefreshButton = document.getElementById("adminRefreshButton");
    const adminLoginBox = document.getElementById("adminLoginBox");
    const adminPanelBox = document.getElementById("adminPanelBox");
    const adminTableBody = document.getElementById("adminTableBody");
    const adminNoticeBox = document.getElementById("adminNoticeBox");
    const adminWelcomeText = document.getElementById("adminWelcomeText");

    const editDocIdInput = document.getElementById("editDocId");
    const editDateInput = document.getElementById("editDate");
    const editTeamNameInput = document.getElementById("editTeamName");
    const editLeaderNameInput = document.getElementById("editLeaderName");
    const editPhoneNumberInput = document.getElementById("editPhoneNumber");
    const editMemberNamesInput = document.getElementById("editMemberNames");
    const adminSaveEditButton = document.getElementById("adminSaveEditButton");
    const adminCancelEditButton = document.getElementById("adminCancelEditButton");

    let selectedDate = null;

    function showNotice(message) {
      noticeBox.textContent = message;
      noticeBox.classList.add("show");
    }

    function hideNotice() {
      noticeBox.textContent = "";
      noticeBox.classList.remove("show");
    }

    function showAdminNotice(message) {
      adminNoticeBox.textContent = message;
      adminNoticeBox.classList.add("show");
    }

    function hideAdminNotice() {
      adminNoticeBox.textContent = "";
      adminNoticeBox.classList.remove("show");
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function makeDateKey(day) {
      return `${YEAR}-05-${pad2(day)}`;
    }

    function getTodayKey() {
      const now = new Date();
      return `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`;
    }

    function formatSelectedDate(dateKey) {
      const weekdayNames = ["일", "월", "화", "수", "목", "금", "토"];
      const date = new Date(`${dateKey}T00:00:00`);
      const day = Number(dateKey.split("-")[2]);
      return `📅 2026년 5월 ${day}일 (${weekdayNames[date.getDay()]})`;
    }

    function formatCreatedAt(value) {
      try {
        if (value && typeof value.toDate === "function") {
          return value.toDate().toLocaleString("ko-KR");
        }
        return new Date(value).toLocaleString("ko-KR");
      } catch {
        return "-";
      }
    }

    function clearEditForm() {
      editDocIdInput.value = "";
      editDateInput.value = "";
      editTeamNameInput.value = "";
      editLeaderNameInput.value = "";
      editPhoneNumberInput.value = "";
      editMemberNamesInput.value = "";
    }

    async function getReservationCount(dateKey) {
      const q = query(collection(db, "reservations"), where("date", "==", dateKey));
      const snapshot = await getDocs(q);
      return snapshot.size;
    }

    async function renderCalendar() {
      calendarGrid.innerHTML = "";

      const firstWeekday = new Date(YEAR, MONTH_INDEX, 1).getDay();
      for (let i = 0; i < firstWeekday; i += 1) {
        const empty = document.createElement("div");
        empty.className = "empty";
        calendarGrid.appendChild(empty);
      }

      const todayKey = getTodayKey();

      for (let day = 1; day <= 31; day += 1) {
        const dateKey = makeDateKey(day);
        const count = await getReservationCount(dateKey);
        const isAllowed = ALLOWED_DATES.has(dateKey);
        const isPastOrToday = dateKey <= todayKey;
        const isFull = count >= MAX_TEAMS;
        const isDisabled = !isAllowed || isPastOrToday || isFull;

        const dayEl = document.createElement("div");
        dayEl.className = "day";
        if (isDisabled) dayEl.classList.add("disabled");
        if (selectedDate === dateKey) dayEl.classList.add("selected");

        let statusText = "";
        if (isAllowed) {
          statusText = `${count}/${MAX_TEAMS}`;
          if (isFull) statusText += `\n마감`;
        }

        dayEl.innerHTML = `
          <div class="day-top">
            <span class="date-number">${day}</span>
            <span class="date-status">${statusText}</span>
          </div>
        `;

        if (!isDisabled) {
          dayEl.addEventListener("click", () => {
            selectedDate = dateKey;
            selectedDateBox.textContent = formatSelectedDate(dateKey);
            hideNotice();
            renderCalendar();
          });
        }

        calendarGrid.appendChild(dayEl);
      }
    }

    async function submitReservation() {
      hideNotice();

      if (!selectedDate) {
        showNotice("먼저 왼쪽 달력에서 날짜를 선택하세요.");
        return;
      }

      const teamName = teamNameInput.value.trim();
      const leaderName = leaderNameInput.value.trim();
      const phoneNumber = phoneNumberInput.value.trim();
      const memberNames = memberNamesInput.value.trim();

      if (!teamName || !leaderName || !phoneNumber || !memberNames) {
        showNotice("팀명, 대표자, 연락처, 팀원이름을 모두 입력하세요.");
        return;
      }

      const latestCount = await getReservationCount(selectedDate);
      if (latestCount >= MAX_TEAMS) {
        showNotice("이미 마감된 날짜입니다.");
        await renderCalendar();
        return;
      }

      try {
        await addDoc(collection(db, "reservations"), {
          teamName,
          leaderName,
          phoneNumber,
          memberNames,
          date: selectedDate,
          createdAt: new Date()
        });

        teamNameInput.value = "";
        leaderNameInput.value = "";
        phoneNumberInput.value = "";
        memberNamesInput.value = "";

        showNotice("예약이 완료되었습니다.");
        await renderCalendar();
        await loadAdminReservations();
      } catch (error) {
        console.error(error);
        showNotice("예약 저장 중 오류가 발생했습니다.");
      }
    }

    async function adminLogin() {
      hideAdminNotice();
      const email = adminEmailInput.value.trim();
      const password = adminPasswordInput.value.trim();

      if (!email || !password) {
        showAdminNotice("관리자 이메일과 비밀번호를 입력하세요.");
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        console.error(error);
        showAdminNotice("관리자 로그인에 실패했습니다.");
      }
    }

    async function startEditReservation(docId) {
      hideAdminNotice();
      try {
        const snap = await getDoc(doc(db, "reservations", docId));
        if (!snap.exists()) {
          showAdminNotice("수정할 예약을 찾을 수 없습니다.");
          return;
        }
        const data = snap.data();
        editDocIdInput.value = docId;
        editDateInput.value = data.date || "";
        editTeamNameInput.value = data.teamName || "";
        editLeaderNameInput.value = data.leaderName || "";
        editPhoneNumberInput.value = data.phoneNumber || "";
        editMemberNamesInput.value = data.memberNames || "";
        showAdminNotice("수정할 예약 정보를 불러왔습니다.");
      } catch (error) {
        console.error(error);
        showAdminNotice("예약 정보를 불러오는 중 오류가 발생했습니다.");
      }
    }

    async function saveEditReservation() {
      hideAdminNotice();

      const docId = editDocIdInput.value.trim();
      if (!docId) {
        showAdminNotice("먼저 예약 목록에서 수정 버튼을 누르세요.");
        return;
      }

      const date = editDateInput.value.trim();
      const teamName = editTeamNameInput.value.trim();
      const leaderName = editLeaderNameInput.value.trim();
      const phoneNumber = editPhoneNumberInput.value.trim();
      const memberNames = editMemberNamesInput.value.trim();

      if (!date || !teamName || !leaderName || !phoneNumber || !memberNames) {
        showAdminNotice("날짜, 팀명, 대표자, 연락처, 팀원이름을 모두 입력하세요.");
        return;
      }

      try {
        await updateDoc(doc(db, "reservations", docId), {
          date,
          teamName,
          leaderName,
          phoneNumber,
          memberNames
        });

        clearEditForm();
        showAdminNotice("예약이 수정되었습니다.");
        await renderCalendar();
        await loadAdminReservations();
      } catch (error) {
        console.error(error);
        showAdminNotice("예약 수정 중 오류가 발생했습니다.");
      }
    }

    async function loadAdminReservations() {
      if (!auth.currentUser) return;

      adminTableBody.innerHTML = `
        <tr>
          <td colspan="7" class="small">불러오는 중...</td>
        </tr>
      `;

      try {
        const q = query(collection(db, "reservations"), orderBy("date"), orderBy("createdAt"));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          adminTableBody.innerHTML = `
            <tr>
              <td colspan="7" class="small">예약 내역이 없습니다.</td>
            </tr>
          `;
          return;
        }

        adminTableBody.innerHTML = "";
        snapshot.forEach((item) => {
          const data = item.data();
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${data.date || "-"}</td>
            <td>${data.teamName || "-"}</td>
            <td>${data.leaderName || "-"}</td>
            <td>${data.phoneNumber || "-"}</td>
            <td>${data.memberNames || "-"}</td>
            <td class="small">${formatCreatedAt(data.createdAt)}</td>
            <td>
              <div style="display:flex; gap:6px; flex-wrap:wrap;">
                <button type="button" class="mini-btn secondary-btn" data-edit-id="${item.id}">수정</button>
                <button type="button" class="danger-btn" data-delete-id="${item.id}">삭제</button>
              </div>
            </td>
          `;
          adminTableBody.appendChild(tr);
        });

        bindAdminTableButtons();
      } catch (error) {
        console.error(error);
        adminTableBody.innerHTML = `
          <tr>
            <td colspan="7" class="small">예약 목록을 불러오지 못했습니다.</td>
          </tr>
        `;
        showAdminNotice("관리자 목록 조회 중 오류가 발생했습니다. Firestore 색인이 필요할 수 있습니다.");
      }
    }

    function bindAdminTableButtons() {
      adminTableBody.querySelectorAll("button[data-edit-id]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.editId;
          if (!id) return;
          startEditReservation(id);
        });
      });

      adminTableBody.querySelectorAll("button[data-delete-id]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.deleteId;
          if (!id) return;
          const ok = confirm("이 예약을 삭제하시겠습니까?");
          if (!ok) return;

          try {
            await deleteDoc(doc(db, "reservations", id));
            showAdminNotice("예약이 삭제되었습니다.");
            clearEditForm();
            await renderCalendar();
            await loadAdminReservations();
          } catch (error) {
            console.error(error);
            showAdminNotice("예약 삭제 중 오류가 발생했습니다.");
          }
        });
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        adminLoginBox.style.display = "none";
        adminPanelBox.style.display = "block";
        adminWelcomeText.textContent = `관리자 로그인됨: ${user.email}`;
        hideAdminNotice();
        await loadAdminReservations();
      } else {
        adminLoginBox.style.display = "block";
        adminPanelBox.style.display = "none";
        adminTableBody.innerHTML = `
          <tr>
            <td colspan="7" class="small">로그인 후 예약 목록이 표시됩니다.</td>
          </tr>
        `;
        clearEditForm();
      }
    });

    reserveButton.addEventListener("click", submitReservation);
    adminLoginButton.addEventListener("click", adminLogin);
    adminLogoutButton.addEventListener("click", async () => {
      await signOut(auth);
    });
    adminRefreshButton.addEventListener("click", loadAdminReservations);
    adminSaveEditButton.addEventListener("click", saveEditReservation);
    adminCancelEditButton.addEventListener("click", () => {
      clearEditForm();
      hideAdminNotice();
    });

    renderCalendar();
  </script>
</body>
</html>
